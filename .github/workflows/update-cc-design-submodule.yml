name: Update cc-design submodule

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-submodule:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update cc-design submodule to latest remote commit
        id: update
        shell: bash
        run: |
          set -euo pipefail

          submodule_path="skills/cc-design"

          git submodule update --init --recursive "${submodule_path}"

          default_branch="$(git -C "${submodule_path}" symbolic-ref refs/remotes/origin/HEAD | sed 's@^refs/remotes/origin/@@')"
          current_commit="$(git -C "${submodule_path}" rev-parse HEAD)"

          git -C "${submodule_path}" fetch origin "${default_branch}"

          target_commit="$(git -C "${submodule_path}" rev-parse "origin/${default_branch}")"

          if [ "${current_commit}" = "${target_commit}" ]; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git -C "${submodule_path}" checkout --detach "${target_commit}"

          echo "changed=true" >> "${GITHUB_OUTPUT}"
          echo "default_branch=${default_branch}" >> "${GITHUB_OUTPUT}"
          echo "old_commit=${current_commit}" >> "${GITHUB_OUTPUT}"
          echo "new_commit=${target_commit}" >> "${GITHUB_OUTPUT}"

      - name: Create pull request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/update-cc-design-submodule
          delete-branch: true
          commit-message: "chore: update cc-design submodule"
          title: "chore: update cc-design submodule"
          body: |
            This PR updates `skills/cc-design` to the latest commit on its remote default branch.

            - Previous commit: `${{ steps.update.outputs.old_commit }}`
            - New commit: `${{ steps.update.outputs.new_commit }}`
            - Source branch: `${{ steps.update.outputs.default_branch }}`
